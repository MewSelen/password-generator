<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Contraseñas Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .box {
      background: #fff;
      color: #333;
      padding: 25px 20px;
      width: 90%;
      max-width: 360px;
      border-radius: 18px;
      box-shadow: 0 15px 25px rgba(0,0,0,0.25);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .box:hover {
      transform: translateY(-5px);
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.8em;
    }

    label {
      font-size: 0.95em;
      color: #555;
    }

    input[type="number"] {
      width: 60px;
      padding: 6px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1em;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      cursor: pointer;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background-color: #667eea;
      color: white;
      font-size: 1em;
      transition: 0.3s;
    }

    button:hover {
      background-color: #5a67d8;
    }

    #result {
      margin-top: 15px;
      font-size: 1.2em;
      word-wrap: break-word;
      padding: 8px;
      border-radius: 8px;
      background-color: #f0f0f0;
      color: #333;
      transition: background 0.3s;
    }

    #strength {
      margin-top: 10px;
      font-weight: 600;
      font-size: 1em;
    }

    .weak { color: #ff4d4d; }
    .medium { color: #ffa500; }
    .strong { color: #4caf50; }

    @media (max-width: 400px) {
      .box { padding: 20px; }
      h2 { font-size: 1.5em; }
    }
    .header {
  display: flex;
  align-items: center;
 justify-content: flex-start;
  gap: 10px;
  margin-bottom: 15px;
}

.logopass {
  width: 35px;
  height: 35px;
  object-fit: contain;
}
  </style>
</head>
<body>

  <div class="box">
   <div class="header">
  <img src="logopass.png" class="logopass">
  <h2>Generador de Contraseñas</h2>
</div>

    <label>Largo:</label>
    <input type="number" id="length" value="12" min="4" max="30"><br><br>

    <label><input type="checkbox" id="upper" checked> Mayúsculas</label><br>
    <label><input type="checkbox" id="lower" checked> Minúsculas</label><br>
    <label><input type="checkbox" id="numbers" checked> Números</label><br>
    <label><input type="checkbox" id="symbols"> Símbolos</label><br><br>

    <button onclick="generatePassword()">Generar</button>

    <h3 id="result"></h3>
    <div id="strength"></div>

    <button onclick="copyPassword()">Copiar</button>
  </div>

  <script>
    function generatePassword() {
      const length = parseInt(document.getElementById("length").value);
      const upper = document.getElementById("upper").checked;
      const lower = document.getElementById("lower").checked;
      const numbers = document.getElementById("numbers").checked;
      const symbols = document.getElementById("symbols").checked;

      let chars = "";
      if (upper) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (lower) chars += "abcdefghijklmnopqrstuvwxyz";
      if (numbers) chars += "0123456789";
      if (symbols) chars += "!@#$%^&*()_+";

      if (chars === "") {
        alert("Seleccioná al menos una opción");
        return;
      }

      let password = "";
      for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
      }

      document.getElementById("result").innerText = password;
      checkStrength(password);
    }

    function copyPassword() {
      const text = document.getElementById("result").innerText;
      if(text === "") {
        alert("No hay contraseña para copiar");
        return;
      }
      navigator.clipboard.writeText(text);
      alert("Contraseña copiada!");
    }

    function checkStrength(password) {
      let strengthEl = document.getElementById("strength");
      let strength = 0;
      if (password.length >= 8) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;

      if (strength <= 1) {
        strengthEl.textContent = "Débil";
        strengthEl.className = "weak";
      } else if (strength === 2 || strength === 3) {
        strengthEl.textContent = "Media";
        strengthEl.className = "medium";
      } else {
        strengthEl.textContent = "Fuerte";
        strengthEl.className = "strong";
      }
    }
  </script>

</body>
</html>
